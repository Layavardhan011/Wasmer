name: libwasmer-build-shim-darwin-arm64

on:
  push:
    branches:
      - main
      - dev-laya
  workflow_dispatch:
  pull_request:

jobs:
  build:
    name: Build shim library for MacOS ARM64
    runs-on: macos-15-intel

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.20"

      - name: Show repo structure
        run: ls -R

      - name: Build library
        run: |
          cd capi_shim
          go mod tidy
          go build -buildmode=c-shared -ldflags="-w" \
          -o $GITHUB_WORKSPACE/libwasmer_darwin_arm64_shim.dylib .
      - name: Fix dylib id
        run: |
          install_name_tool -id @rpath/libwasmer_darwin_arm64_shim.dylib \
          $GITHUB_WORKSPACE/libwasmer_darwin_arm64_shim.dylib
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-darwin-arm64
          path: libwasmer_darwin_arm64_shim.dylib